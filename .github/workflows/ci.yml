#===================================================================
#  DeelTech Solutions - CI/CD Pipeline
#===================================================================
#  Continuous integration workflow for the Faculty Account
#  Automation System. Runs linting, syntax checks, and
#  validation on every push and pull request.
#
#  Course : CSC2510 - DevOps Final Project (Spring 2026)
#===================================================================

name: DeelTech CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Lint — Static analysis with ShellCheck
  # ─────────────────────────────────────────────────────────────
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell scripts
        run: |
          echo "=== Running ShellCheck ==="
          find . -name "*.sh" -type f | while read -r script; do
            echo "Checking: $script"
            shellcheck -s bash -S warning "$script"
          done
          echo "=== ShellCheck complete ==="

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Test — Syntax validation and structure checks
  # ─────────────────────────────────────────────────────────────
  test:
    name: Script Validation
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check BASH syntax (bash -n)
        run: |
          echo "=== Syntax Validation ==="
          find . -name "*.sh" -type f | while read -r script; do
            echo "Validating syntax: $script"
            bash -n "$script"
            echo "  [PASS] $script"
          done
          echo "=== Syntax validation complete ==="

      - name: Verify script is executable
        run: |
          echo "=== Permission Checks ==="
          MAIN_SCRIPT="scripts/main.sh"
          if [ -f "$MAIN_SCRIPT" ]; then
            if [ -x "$MAIN_SCRIPT" ]; then
              echo "  [PASS] $MAIN_SCRIPT is executable"
            else
              echo "  [FAIL] $MAIN_SCRIPT is not executable"
              echo "  Fix with: chmod +x $MAIN_SCRIPT"
              exit 1
            fi
          else
            echo "  [WARN] $MAIN_SCRIPT not found — skipping permission check"
          fi
          echo "=== Permission checks complete ==="

      - name: Verify required functions exist
        run: |
          echo "=== Function Verification ==="
          MAIN_SCRIPT="scripts/main.sh"
          REQUIRED_FUNCTIONS=(
            "check_license"
            "scrape_faculty"
            "create_user"
            "batch_create_users"
            "manual_add_user"
            "generate_password"
            "rotate_all_passwords"
            "write_credential"
            "main"
          )
          MISSING=0
          for func in "${REQUIRED_FUNCTIONS[@]}"; do
            if grep -qE "^${func}\(\)|^${func} \(\)" "$MAIN_SCRIPT"; then
              echo "  [PASS] Found function: $func"
            else
              echo "  [FAIL] Missing function: $func"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "  $MISSING required function(s) missing!"
            exit 1
          fi
          echo "=== Function verification complete ==="

      - name: Check for required configuration variables
        run: |
          echo "=== Configuration Checks ==="
          MAIN_SCRIPT="scripts/main.sh"
          REQUIRED_VARS=(
            "FACULTY_URL"
            "LICENSE_DIR"
            "LICENSE_FILE"
            "CREATED_USERS_LOG"
            "CREDENTIALS_DIR"
            "CREDENTIALS_FILE"
          )
          for var in "${REQUIRED_VARS[@]}"; do
            if grep -q "$var" "$MAIN_SCRIPT"; then
              echo "  [PASS] Found variable: $var"
            else
              echo "  [WARN] Variable not found: $var"
            fi
          done
          echo "=== Configuration checks complete ==="

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Package — Build and publish release artifact
  # ─────────────────────────────────────────────────────────────
  package:
    name: Package Release Artifact
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release tarball
        run: |
          echo "=== Packaging release ==="
          mkdir -p dist
          tar -czf dist/deeltech-release.tar.gz \
            scripts/main.sh \
            docs/user_manual.md \
            README.md
          ls -lh dist/
          echo "=== Package built ==="

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: deeltech-release
          path: dist/deeltech-release.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Stage 4: Deploy — Deployment to target VM
  # ─────────────────────────────────────────────────────────────
